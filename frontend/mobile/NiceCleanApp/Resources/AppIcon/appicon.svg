<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Clean white background (Square) -->
  <rect width="512" height="512" fill="#FFFFFF" />

  <!-- Soft green glow -->
  <circle cx="256" cy="256" r="230" fill="#97C459" opacity="0.12" />

  <!-- Larger, centered leaf -->
  <g transform="translate(256, 256) scale(5.2) translate(-14, -14)">
    <!-- Leaf body -->
    <path d="M14 3C14 3 5 8 5 16C5 20.4 9.1 24 14 24C18.9 24 23 20.4 23 16C23 8 14 3 14 3Z" 
          fill="#97C459" />
    
    <!-- Central vein -->
    <path d="M14 24V12" 
          stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round" />
    
    <!-- Left vein -->
    <path d="M14 12C14 12 10 15 9 19" 
          stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round" />
    
    <!-- Right vein -->
    <path d="M14 12C14 12 18 15 19 19" 
          stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round" />
  </g>
</svg>